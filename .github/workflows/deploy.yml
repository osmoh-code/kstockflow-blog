# Next.js 블로그 Vercel 배포 워크플로우
# main 브랜치에 푸시할 때 자동으로 빌드 및 배포 실행

name: Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: 빌드 및 배포
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # 2. Node.js 20 설정
      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. node_modules 캐시
      - name: node_modules 캐시
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # 4. .next 빌드 캐시
      - name: Next.js 빌드 캐시
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'package.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.mdx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'package.json') }}-
            ${{ runner.os }}-nextjs-

      # 5. 의존성 설치
      - name: 의존성 설치
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # 6. Vercel CLI 설치
      - name: Vercel CLI 설치
        run: npm install -g vercel@latest

      # 7. Vercel 환경 설정 가져오기
      - name: Vercel 프로덕션 환경 설정
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # 8. Next.js 프로덕션 빌드
      - name: 프로덕션 빌드
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # 9. Vercel 프로덕션 배포
      - name: 프로덕션 배포
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
