<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>스페이스X — KStockFlow Thumbnail</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', sans-serif;
  }
  .container {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #475569 100%);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 60px 70px;
    position: relative;
  }
  /* Decorative circles */
  .container::before {
    content: '';
    position: absolute;
    top: -80px;
    right: -80px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .container::after {
    content: '';
    position: absolute;
    bottom: -60px;
    left: -60px;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 20px;
    font-weight: 600;
    backdrop-filter: blur(4px);
  }
  .date {
    color: rgba(255,255,255,0.7);
    font-size: 18px;
    font-weight: 400;
  }
  .title-area {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
  }
  .title {
    color: #ffffff;
    font-size: 52px;
    font-weight: 800;
    line-height: 1.35;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    word-break: keep-all;
  }
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    z-index: 1;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-icon {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
  }
  .brand-text {
    color: rgba(255,255,255,0.9);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .url {
    color: rgba(255,255,255,0.5);
    font-size: 16px;
    font-weight: 400;
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-row">
    <div class="badge">💹 2026-03-19-x</div>
    <div class="date">2026년 3월 19일</div>
  </div>
  <div class="title-area">
    <h1 class="title">스페이스X</h1>
  </div>
  <div class="bottom-row">
    <div class="brand">
      <div class="brand-icon">K</div>
      <span class="brand-text">KStockFlow</span>
    </div>
    <div class="url">kstockflow.com</div>
  </div>
</div>
</body>
</html>
